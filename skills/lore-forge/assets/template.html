<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} - 知识图谱</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  color: #333; background: #FAFAFA; line-height: 1.75;
}
code, pre {
  font-family: "JetBrains Mono", "Fira Code", "Source Code Pro", monospace;
}

.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 260px;
  background: #F5F5F5; border-right: 1px solid #E5E5E5;
  overflow-y: auto; padding: 24px 0; z-index: 10;
}
.main {
  margin-left: 260px; padding: 40px 48px;
  max-width: 1120px;
}
.content { max-width: 860px; }

.sidebar-title {
  font-size: 16px; font-weight: 700; color: #1A1A1A;
  padding: 0 20px 16px; border-bottom: 1px solid #E5E5E5;
  margin-bottom: 12px;
}
.nav-group { margin-bottom: 8px; }
.nav-group-label {
  font-size: 13px; font-weight: 600; color: #1A1A1A;
  padding: 6px 20px; cursor: pointer; display: flex;
  align-items: center; gap: 6px; user-select: none;
}
.nav-group-label:hover { background: #EBEBEB; }
.nav-group-label svg { transition: transform 0.2s; }
.nav-group.collapsed .nav-group-label svg { transform: rotate(-90deg); }
.nav-group.collapsed .nav-items { display: none; }
.nav-item {
  display: block; font-size: 13px; color: #666;
  padding: 4px 20px 4px 36px; text-decoration: none;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: #333; background: #EBEBEB; }
.nav-item.active {
  color: #2B6CB0; background: #E8F0FE;
  border-left-color: #2B6CB0; font-weight: 500;
}

h1 { font-size: 28px; font-weight: 700; color: #1A1A1A; margin-bottom: 8px; }
h2 {
  font-size: 22px; font-weight: 600; color: #1A1A1A;
  margin: 48px 0 16px; padding-bottom: 8px;
  border-bottom: 1px solid #E5E5E5;
}
h3 { font-size: 18px; font-weight: 600; color: #1A1A1A; margin: 32px 0 12px; }
h4 { font-size: 15px; font-weight: 600; color: #333; margin: 20px 0 8px; }
p { margin-bottom: 12px; }

.knowledge-section {
  margin-bottom: 32px; padding: 24px 28px;
  border: 1px solid #E5E5E5; border-radius: 4px; background: #FFF;
}
.knowledge-section h3 { margin-top: 0; }

.prerequisite {
  margin: 12px 0; padding: 12px 16px;
  border: 1px solid #D9D9D9; border-radius: 4px;
  background: #F7F7F7; font-size: 14px;
  display: flex; align-items: flex-start; gap: 8px;
}
.prerequisite svg { flex-shrink: 0; margin-top: 2px; }

.interview-block {
  margin: 16px 0; padding: 16px 20px;
  border-left: 3px solid #2B6CB0; background: #FAFAFA;
}
.interview-block h4 { margin-top: 0; color: #2B6CB0; }
.interview-q { font-weight: 600; margin-bottom: 8px; }
.interview-a { color: #333; }
.interview-followup {
  margin-top: 8px; padding-top: 8px;
  border-top: 1px dashed #D9D9D9;
  font-size: 14px; color: #666;
}

pre {
  margin: 12px 0; padding: 14px 18px;
  background: #F7F7F7; border: 1px solid #EBEBEB;
  border-radius: 4px; overflow-x: auto; font-size: 13px;
}
code { background: #F0F0F0; padding: 2px 5px; border-radius: 3px; font-size: 13px; }
pre code { background: none; padding: 0; }

.section-desc {
  color: #666; font-size: 14px; margin-bottom: 24px;
  padding-bottom: 16px; border-bottom: 1px solid #E5E5E5;
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-title">{{TITLE}}</div>
  {{NAV_ITEMS}}
</nav>

<div class="main">
  <div class="content">
    <h1>{{TITLE}}</h1>
    <p class="section-desc">{{SUBTITLE}}</p>
    {{CONTENT}}
  </div>
</div>

<script>
document.addEventListener('scroll', () => {
  const sections = document.querySelectorAll('section[id]');
  const navItems = document.querySelectorAll('.nav-item');
  let current = '';
  sections.forEach(s => {
    if (window.scrollY >= s.offsetTop - 80) current = s.id;
  });
  navItems.forEach(item => {
    item.classList.toggle('active', item.getAttribute('href') === '#' + current);
  });
});
</script>
</body>
</html>
